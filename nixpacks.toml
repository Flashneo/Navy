[phases.setup]
nixPkgs = ["python311Full", "python311Packages.pip", "python311Packages.setuptools"]

[phases.install]
cmds = [
  "python3.11 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = []

[start]
cmd = "/opt/venv/bin/uvicorn api.server:app --host 0.0.0.0 --port ${PORT:-8000}"
